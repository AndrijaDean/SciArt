<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Project Trilemma</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="outer">
        <div class="left">
            <p class="trilemma-title">The project trilemma</p>

            <div class="slider-row">
                <div class="slider-name">Price</div>
                <div class="slider-labels">
                    <span class="lbl-lo">Cheap</span>
                    <span class="lbl-hi">Expensive</span>
                </div>
                <div class="slider-wrap">
                    <span class="val-lo">1</span>
                    <input type="range" min="1" max="100" value="50" step="1" id="s-price">
                    <span class="val-hi">100</span>
                </div>
                <div class="val-display">Value: <span id="v-price">50</span></div>
            </div>

            <div class="slider-row">
                <div class="slider-name">Quality</div>
                <div class="slider-labels">
                    <span class="lbl-lo">Poor</span>
                    <span class="lbl-hi">Good</span>
                </div>
                <div class="slider-wrap">
                    <span class="val-lo">1</span>
                    <input type="range" min="1" max="100" value="50" step="1" id="s-quality">
                    <span class="val-hi">100</span>
                </div>
                <div class="val-display">Value: <span id="v-quality">50</span></div>
            </div>

            <div class="slider-row">
                <div class="slider-name">Speed</div>
                <div class="slider-labels">
                    <span class="lbl-lo">Slow</span>
                    <span class="lbl-hi">Fast</span>
                </div>
                <div class="slider-wrap">
                    <span class="val-lo">1</span>
                    <input type="range" min="1" max="100" value="50" step="1" id="s-speed">
                    <span class="val-hi">100</span>
                </div>
                <div class="val-display">Value: <span id="v-speed">50</span></div>
            </div>

            <div class="luck-row">
                <label class="luck-label">
                    <input type="checkbox" id="luck-factor">
                    <span class="luck-text">🍀 Luck Factor</span>
                </label>
            </div>

            <div class="badge-row">
                <span class="badge badge-neutral" id="badge-verdict">Balanced</span>
            </div>
        </div>
